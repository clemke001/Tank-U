<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#0d1117"/>
  <!-- Gauge arc track -->
  <path d="M 18,76 A 36,36 0 0,1 82,76" fill="none" stroke="#21262d" stroke-width="11" stroke-linecap="round"/>
  <!-- Gauge arc fill (~65%) -->
  <path d="M 18,76 A 36,36 0 0,1 82,76" fill="none" stroke="#f0a500" stroke-width="11" stroke-linecap="round"
        stroke-dasharray="73 113" stroke-dashoffset="0"/>
  <!-- Needle -->
  <line x1="50" y1="76" x2="74" y2="42" stroke="#f0a500" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="76" r="4.5" fill="#f0a500"/>
  <!-- E / F labels -->
  <text x="13" y="90" font-size="10" fill="#8b949e" font-family="sans-serif" font-weight="bold">E</text>
  <text x="82" y="90" font-size="10" fill="#8b949e" font-family="sans-serif" font-weight="bold">F</text>
</svg>
